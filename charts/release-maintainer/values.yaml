frontend:
  image:
    repository: ghcr.io/justme0606/release-maintainer-frontend
    tag: latest
    pullPolicy: Always
  service:
    port: 80

backend:
  image:
    repository: ghcr.io/justme0606/release-maintainer-backend
    tag: latest
    pullPolicy: Always
  service:
    port: 8000

redis:
  enabled: true
  image:
    repository: redis
    tag: "7-alpine"
    pullPolicy: IfNotPresent
  service:
    port: 6379

ingress:
  enabled: false
  host: release-maintainer.local